services:
  # ── Base de datos MySQL local ──────────────────────────────
  db:
    image: mysql:8.0
    container_name: flowly_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: flowly_root
      MYSQL_DATABASE: flowly
      MYSQL_USER: flowly
      MYSQL_PASSWORD: flowly_secret
    volumes:
      - flowly_dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uflowly", "-pflowly_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Aplicación Laravel + React ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowly_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persistir archivos subidos por el usuario
      - flowly_storage:/app/storage/app/public
    environment:
      APP_NAME: Flowly
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY:-}"
      APP_URL: http://localhost:8000

      # Base de datos — apunta al servicio 'db' de este compose
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: flowly
      DB_USERNAME: flowly
      DB_PASSWORD: flowly_secret

      # Drivers
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr

      # IA (Groq compatible con OpenAI SDK)
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_BASE_URL: "${GROQ_BASE_URL:-https://api.groq.com/openai/v1}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
    restart: unless-stopped

volumes:
  flowly_dbdata:
  flowly_storage:
