services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowly_app
    ports:
      - "8000:8000"
    volumes:
      # Certificado SSL de TiDB — descárgalo de TiDB Cloud Console
      # y colócalo en storage/app/tidb-ca.pem antes de levantar el contenedor.
      # Ver: https://docs.pingcap.com/tidbcloud/tidb-cloud-tls-connect-to-dedicated
      - ./storage/app/tidb-ca.pem:/app/storage/app/tidb-ca.pem:ro
      # Persistir archivos subidos por el usuario
      - flowly_storage:/app/storage/app/public
    environment:
      APP_NAME: Flowly
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: gateway01.eu-central-1.prod.aws.tidbcloud.com
      DB_PORT: "4000"
      DB_DATABASE: test
      DB_USERNAME: 1MQSm4PzEfnqpbW.root
      DB_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ATTR_SSL_CA: /app/storage/app/tidb-ca.pem
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL}"
      OPENAI_MODEL: "${OPENAI_MODEL}"
    restart: unless-stopped

volumes:
  flowly_storage:
